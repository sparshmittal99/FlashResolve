spring:
  application:
    name: ingestion-gateway

  # Cloud Data Layer Setup (Neon PostgreSQL)
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flash_resolve_db}}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:secretpassword}
    driver-class-name: org.postgresql.Driver

  # Hibernate Engine Optimization
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true

  # Serverless Event Stream Setup (Upstash Redis)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

# Render injects a dynamic port parameter. This adapts automatically.
server:
  port: ${PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  metrics:
    tags:
      application: ingestion-gateway